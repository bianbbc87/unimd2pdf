# Sample config — all options with defaults shown
theme: light
page:
  size: A4
  orientation: portrait
  margin: "20mm 18mm"
font:
  family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif'
  size: 11pt
code:
  highlight-style: github
markdown:
  footnote: true
  definitionlist: true
  typographer: true
  cjk: true
mermaid:
  enabled: true
  theme: default
