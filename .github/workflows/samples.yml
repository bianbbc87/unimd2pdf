name: Generate Sample PDFs

on:
  push:
    branches: [main]
    paths:
      - "samples/**"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install mmdc
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Create mmdc puppeteer config
        run: |
          echo '{ "args": ["--no-sandbox", "--disable-setuid-sandbox"] }' > /tmp/puppeteer.json

      - name: Build unimd2pdf
        run: go build -o unimd2pdf ./main.go

      - name: Generate sample PDFs
        env:
          PUPPETEER_CHROMIUM_REVISION: 0
          CHROME_DEVEL_SANDBOX: ""
        run: |
          cd samples
          for f in *.md; do
            echo "Converting: $f"
            if [ "$f" = "08-dark-theme.md" ]; then
              MMDC_PUPPETEER_CONFIG=/tmp/puppeteer.json ../unimd2pdf -i "$f" --theme dark || true
            else
              MMDC_PUPPETEER_CONFIG=/tmp/puppeteer.json ../unimd2pdf -i "$f" || true
            fi
          done

      - name: Upload sample PDFs
        uses: actions/upload-artifact@v4
        with:
          name: sample-pdfs
          path: samples/*.pdf
          retention-days: 90
