name: Generate Sample PDFs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install mmdc
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Create mmdc puppeteer config
        run: |
          echo '{ "args": ["--no-sandbox", "--disable-setuid-sandbox"] }' > /tmp/puppeteer.json

      - name: Build unimd2pdf
        run: go build -o unimd2pdf ./main.go

      - name: Generate sample PDFs
        env:
          MMDC_PUPPETEER_CONFIG: /tmp/puppeteer.json
        run: |
          cd samples
          for f in *.md; do
            echo "Converting: $f"
            if [ "$f" = "08-dark-theme.md" ]; then
              ../unimd2pdf -i "$f" --theme dark || true
            else
              ../unimd2pdf -i "$f" || true
            fi
          done

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add samples/*.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate sample PDFs [skip ci]"
          git push
