name: Generate Sample PDFs

on:
  push:
    branches: [main]
    paths:
      - "samples/**"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install mmdc
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build unimd2pdf
        run: go build -o unimd2pdf ./main.go

      - name: Generate sample PDFs
        run: |
          cd samples
          for f in *.md; do
            if [ "$f" = "08-dark-theme.md" ]; then
              ../unimd2pdf -i "$f" --theme dark
            else
              ../unimd2pdf -i "$f"
            fi
          done

      - name: Upload sample PDFs
        uses: actions/upload-artifact@v4
        with:
          name: sample-pdfs
          path: samples/*.pdf
          retention-days: 90
