name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "1.24"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -o unimd2pdf ./main.go

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  samples:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'samples/') || contains(github.event.head_commit.added, 'samples/')
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install mmdc
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build unimd2pdf
        run: go build -o unimd2pdf ./main.go

      - name: Generate sample PDFs
        run: |
          cd samples
          for f in *.md; do
            if [ "$f" = "08-dark-theme.md" ]; then
              ../unimd2pdf -i "$f" --theme dark
            else
              ../unimd2pdf -i "$f"
            fi
          done

      - name: Upload sample PDFs
        uses: actions/upload-artifact@v4
        with:
          name: sample-pdfs
          path: samples/*.pdf
          retention-days: 30
